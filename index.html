<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美西大環線 6日自駕行程與美食指南 | Summer Odyssey</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-logo">
        <i class="fa-solid fa-compass-drafting logo-icon"></i>
        <div>
          <h1 data-i18n="header_title">Summer Odyssey</h1>
          <p data-i18n="header_subtitle">美西大環線 6日自駕與美食探索規劃</p>
        </div>
      </div>
      
      <!-- Language Toggle Actions -->
      <div class="header-actions">
        <button id="langToggleBtn" class="lang-toggle-btn" aria-label="切換語言 / Toggle Language">
          <i class="fa-solid fa-language"></i>
          <span id="langToggleText">English</span>
        </button>
      </div>

      <div class="header-stats">
        <div class="stat-badge">
          <i class="fa-solid fa-road"></i>
          <span data-i18n="stat_miles">約 1,201 英哩</span>
        </div>
        <div class="stat-badge">
          <i class="fa-solid fa-clock"></i>
          <span data-i18n="stat_hours">累計行車 ~21 小時</span>
        </div>
      </div>
    </header>

    <div class="main-layout">
      
      <!-- Sidebar Navigation -->
      <aside class="sidebar">
        <!-- Family Profile Section -->
        <section class="sidebar-section family-profile">
          <h2 class="section-title"><i class="fa-solid fa-people-group"></i> <span data-i18n="sidebar_profile_title">家庭成員與背景</span></h2>
          <div class="profile-list">
            <div class="profile-item">
              <div class="profile-label" data-i18n="sidebar_profile_size_label">成員規模</div>
              <div class="profile-value" data-i18n="sidebar_profile_size_val">5 人家庭旅遊</div>
            </div>
            <div class="profile-item">
              <div class="profile-label" data-i18n="sidebar_profile_parents_label">父母背景</div>
              <div class="profile-value" data-i18n="sidebar_profile_parents_val">夫妻 50 歲 (台裔新移民，定居美國 ~20 年)</div>
            </div>
            <div class="profile-item">
              <div class="profile-label" data-i18n="sidebar_profile_children_label">孩子成員</div>
              <div class="profile-value" data-i18n="sidebar_profile_children_val">15 歲三胞胎 (二女一男)</div>
            </div>
          </div>
        </section>

        <!-- Day Tabs -->
        <section class="sidebar-section">
          <h2 class="section-title"><i class="fa-solid fa-calendar-days"></i> <span data-i18n="sidebar_itinerary_title">每日行程規劃</span></h2>
          <div class="day-tabs" id="dayTabsContainer">
            <!-- Tabs will be rendered here by script.js -->
          </div>
        </section>

        <!-- Booking Progress Tracker -->
        <section class="sidebar-section booking-tracker">
          <h2 class="section-title">
            <i class="fa-solid fa-wallet"></i> 
            <span data-i18n="sidebar_booking_title">訂單預訂進度</span>
            <span class="progress-percent" id="bookingProgressText">0%</span>
          </h2>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="bookingProgressBar" style="width: 0%"></div>
          </div>
          <ul class="tracker-list" id="bookingChecklist">
            <!-- Checklist items will be rendered here by script.js -->
          </ul>
        </section>

        <!-- Budget Summary -->
        <section class="sidebar-section budget-section">
          <h2 class="section-title"><i class="fa-solid fa-dollar-sign"></i> <span data-i18n="sidebar_budget_title">預算花費估算</span></h2>
          <div class="budget-row">
            <span data-i18n="sidebar_budget_est">預估總計:</span>
            <span class="budget-value" id="totalEstimateVal">$0</span>
          </div>
          <div class="budget-row highlight">
            <span data-i18n="sidebar_budget_act">實付總計:</span>
            <span class="budget-value" id="totalActualVal">$0</span>
          </div>
        </section>
      </aside>

      <!-- Main Content Area -->
      <main class="content-area">
        
        <!-- Interactive Day Details Card -->
        <article class="detail-card glass-panel" id="dayDetailCard">
          <!-- Rendered dynamically by script.js -->
        </article>

        <!-- Maps and Routes Explorer -->
        <section class="maps-explorer glass-panel">
          <div class="section-header">
            <h3><i class="fa-solid fa-map-location-dot"></i> <span data-i18n="main_map_title">當日行車路線地圖</span></h3>
            <a id="openFullMapBtn" href="#" target="_blank" class="timeline-nav-btn" title="導航：Google Maps 完整路線">
              <i class="fa-solid fa-location-arrow"></i>
              <span data-i18n="main_map_nav_btn">導航：Google Maps 完整路線</span>
            </a>
          </div>
          <div class="map-container">
            <iframe id="liveMapIframe" class="live-map-frame" src="" style="border:0; width:100%; height:100%;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </section>


        <!-- Interactive Packing List -->
        <section class="packing-list glass-panel">
          <div class="section-header">
            <h3><i class="fa-solid fa-suitcase"></i> <span data-i18n="main_packing_title">行前與裝備準備清單</span></h3>
            <span class="packing-count" id="packingCountText">0 / 0 Completed</span>
          </div>
          <div class="packing-grid" id="packingListGrid">
            <!-- Packing categories and items rendered by script.js -->
          </div>
        </section>

      </main>

    </div>

  </div>

  <!-- Local Script -->
  <script src="script.js"></script>
</body>
</html>
